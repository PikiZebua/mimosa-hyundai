<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Piki Finelis Zebua — Sales Consultant Hyundai Medan</title>
  <meta name="description" content="Piki Finelis Zebua - Sales Consultant Hyundai di Mimosa Hyundai Medan. Hubungi untuk info promo, harga, dan jadwal test drive Hyundai."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 font-sans">

  <div id="navbar"></div>

  <main>
    <!-- Hero -->
    <section class="bg-gradient-to-br from-[#003876] to-[#1565C0] py-16 px-4">
      <div class="max-w-3xl mx-auto text-center text-white">
        <!-- Profile Initial -->
        <div class="flex justify-center mb-6">
          <div class="w-24 h-24 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center border-4 border-white/30">
            <span class="text-white font-black text-4xl">PF</span>
          </div>
        </div>
        <h1 id="hero-name" class="text-3xl md:text-5xl font-black tracking-tight mb-2">Piki Finelis Zebua</h1>
        <p id="hero-tagline" class="text-blue-200 text-lg md:text-xl mb-1">Sales Consultant Hyundai</p>
        <p id="hero-company" class="text-blue-300 text-sm">Mimosa Hyundai Medan</p>
      </div>
    </section>

    <!-- Contact + Map -->
    <section class="max-w-5xl mx-auto px-4 py-12">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

        <!-- Left: Contact Info -->
        <div id="contact" class="bg-white rounded-2xl shadow-sm p-8 flex flex-col">
          <h2 class="text-[#003876] font-black text-xl mb-6">Informasi Kontak</h2>
          <div class="space-y-4 text-gray-700 flex-1">
            <div class="flex items-start gap-3">
              <div class="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-[#003876]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              </div>
              <span id="dealer-address" class="leading-relaxed pt-1"></span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-[#003876]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </div>
              <a id="dealer-phone" href="#" class="text-[#003876] font-semibold hover:underline"></a>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 bg-green-50 rounded-lg flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-green-600" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              </div>
              <a id="dealer-wa" href="#" target="_blank" rel="noopener" class="text-green-600 font-semibold hover:underline">WhatsApp</a>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-[#003876]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              </div>
              <a id="dealer-email" href="#" class="text-[#003876] font-semibold hover:underline"></a>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-[#003876]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
              <span id="dealer-hours" class="text-gray-600"></span>
            </div>
          </div>
          <a id="wa-button" href="#" target="_blank" rel="noopener"
             class="mt-8 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl text-center transition-colors duration-200 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.853L.053 23.947a.5.5 0 00.606.606l6.094-1.479A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 01-5.015-1.374l-.36-.214-3.714.9.916-3.616-.235-.373A9.797 9.797 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/>
            </svg>
            Chat WhatsApp Sekarang
          </a>
        </div>

        <!-- Right: Map -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col">
          <div class="p-6 pb-0">
            <h2 class="text-[#003876] font-black text-xl mb-4">Lokasi</h2>
          </div>
          <div class="flex-1 min-h-[400px]">
            <iframe id="maps-iframe"
              src=""
              width="100%"
              height="400"
              style="border:0;"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              class="w-full h-full min-h-[400px]">
            </iframe>
          </div>
        </div>

      </div>
    </section>

    <!-- Sales Team -->
    <section id="sales-section" class="max-w-5xl mx-auto px-4 pb-16 hidden">
      <h2 class="text-[#003876] font-black text-2xl mb-6">Tim Sales Kami</h2>
      <div id="sales-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <div id="wa-float"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar('about.html');

      const dealer = await loadJSON('data/dealer.json');
      if (!dealer) return;

      renderFooter(dealer);

      // Hero
      if (dealer.name) document.getElementById('hero-name').textContent = dealer.name;
      if (dealer.tagline) document.getElementById('hero-tagline').textContent = dealer.tagline;
      if (dealer.company) document.getElementById('hero-company').textContent = dealer.company;

      // Contact
      document.getElementById('dealer-address').textContent = dealer.address || '';

      const phoneEl = document.getElementById('dealer-phone');
      phoneEl.textContent = dealer.phone || '';
      phoneEl.href = `tel:${dealer.phone || ''}`;

      const waLink = buildWhatsAppLink(dealer.whatsapp, 'Halo, saya ingin mengetahui lebih lanjut tentang Mimosa Hyundai.');
      document.getElementById('dealer-wa').href = waLink;
      document.getElementById('wa-button').href = waLink;

      const emailEl = document.getElementById('dealer-email');
      emailEl.textContent = dealer.email || '';
      emailEl.href = `mailto:${dealer.email || ''}`;

      document.getElementById('dealer-hours').textContent = dealer.hours || '';

      // Map
      if (dealer.mapsEmbed) {
        document.getElementById('maps-iframe').src = dealer.mapsEmbed;
      }

      // Sales team
      if (dealer.sales && dealer.sales.length > 0) {
        const section = document.getElementById('sales-section');
        const grid = document.getElementById('sales-grid');
        section.classList.remove('hidden');

        dealer.sales.forEach(person => {
          const initial = (person.name || '?').charAt(0).toUpperCase();
          const waHref = buildWhatsAppLink(person.phone, `Halo ${person.name}, saya ingin bertanya mengenai Hyundai.`);
          const card = document.createElement('a');
          card.href = waHref;
          card.target = '_blank';
          card.rel = 'noopener';
          card.className = 'bg-white rounded-2xl shadow-sm p-6 flex flex-col items-center gap-3 hover:shadow-md transition-shadow duration-200';
          card.innerHTML = `
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#003876] to-[#1565C0] flex items-center justify-center text-white font-black text-2xl">
              ${initial}
            </div>
            <div class="text-center">
              <div class="font-semibold text-gray-800 text-sm leading-tight">${person.name || ''}</div>
              <div class="text-green-600 text-xs mt-1 flex items-center justify-center gap-1">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.853L.053 23.947a.5.5 0 00.606.606l6.094-1.479A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 01-5.015-1.374l-.36-.214-3.714.9.916-3.616-.235-.373A9.797 9.797 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
                WhatsApp
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      initWAButton(dealer.whatsapp, 'Halo, saya ingin mengetahui lebih lanjut tentang Mimosa Hyundai.');
      initMobileMenu();
    });
  </script>
</body>
</html>
