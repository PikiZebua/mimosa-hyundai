<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk — Mimosa Hyundai Medan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">

  <div id="navbar-container"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Breadcrumb -->
    <nav id="breadcrumb" class="flex items-center gap-2 text-sm text-gray-500 mb-6">
      <a href="index.html" class="hover:text-[#003876] transition-colors">Home</a>
      <span>/</span>
      <a href="catalog.html" class="hover:text-[#003876] transition-colors">Produk</a>
      <span>/</span>
      <span id="breadcrumb-name" class="text-gray-700 font-medium"></span>
    </nav>

    <!-- Product Content -->
    <div id="product-content"></div>

    <!-- Related Products -->
    <section id="related-section" class="mt-16 hidden">
      <h2 class="text-2xl font-black text-[#003876] mb-6">Produk Lainnya</h2>
      <div id="related-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </section>

  </main>

  <div id="footer-container"></div>

  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const productId = params.get('id');

      const [products, dealer] = await Promise.all([
        loadJSON('products.json'),
        loadJSON('dealer.json'),
      ]);

      // Render navbar & footer
      document.getElementById('navbar-container').innerHTML = renderNavbar('catalog.html');
      document.getElementById('footer-container').innerHTML = renderFooter(dealer);
      initMobileMenu();

      const wa = dealer.whatsapp || dealer.phone;

      const product = products.find(p => p.id === productId);

      if (!product) {
        document.title = 'Produk Tidak Ditemukan — Mimosa Hyundai Medan';
        document.getElementById('breadcrumb-name').textContent = 'Tidak Ditemukan';
        document.getElementById('product-content').innerHTML = `
          <div class="flex flex-col items-center justify-center py-24 text-center">
            <div class="text-6xl mb-4">🔍</div>
            <h1 class="text-2xl font-black text-gray-700 mb-2">Produk Tidak Ditemukan</h1>
            <p class="text-gray-500 mb-6">ID produk tidak valid atau produk sudah tidak tersedia.</p>
            <a href="catalog.html" class="bg-[#003876] text-white font-bold px-6 py-3 rounded-lg hover:bg-[#1565C0] transition-colors">← Kembali ke Katalog</a>
          </div>`;
        initWAButton(wa, 'Halo Mimosa Hyundai, saya ingin mengetahui produk yang tersedia.');
        return;
      }

      // Set page title
      document.title = `${product.name} — Mimosa Hyundai Medan`;
      document.getElementById('breadcrumb-name').textContent = product.name;

      // Build gallery list
      const galleryImages = (product.gallery && product.gallery.length > 0)
        ? [product.image, ...product.gallery]
        : [product.image];

      const waMessage = `Halo Mimosa Hyundai, saya tertarik dengan ${product.name} ${product.year}. Bisa info lebih lanjut?`;
      const waLink = buildWhatsAppLink(wa, waMessage);

      const categoryColor = getCategoryColor(product.subcategory);
      const categoryLabel = getCategoryLabel(product.category, product.subcategory);

      // Variants table rows
      const variantRows = (product.variants || []).map((v, i) => `
        <tr class="${i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}">
          <td class="px-4 py-3 text-sm text-gray-700">${v.name}</td>
          <td class="px-4 py-3 text-sm font-semibold text-[#003876] text-right">${formatPrice(v.price)}</td>
        </tr>`).join('');

      // Specs grid cards
      const specCards = (product.specs || []).map(s => `
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">${s.key}</div>
          <div class="text-sm font-semibold text-gray-800">${s.value}</div>
        </div>`).join('');

      // Notes
      const notesHtml = (product.notes && product.notes.length > 0)
        ? `<p class="text-xs text-gray-500 mt-4">${product.notes.join(' &nbsp;·&nbsp; ')}</p>`
        : '';

      // Thumbnail row
      const thumbnailsHtml = galleryImages.length > 1
        ? `<div class="flex gap-2 mt-3 overflow-x-auto pb-1">
            ${galleryImages.map((img, i) => `
              <button onclick="changeMainPhoto('${img}', this)"
                class="flex-shrink-0 w-20 h-14 rounded-lg overflow-hidden border-2 ${i === 0 ? 'border-[#003876]' : 'border-gray-200'} transition-all focus:outline-none thumb-btn">
                <img src="${img}" alt="Foto ${i + 1}" class="w-full h-full object-cover" onerror="handleImageError(this)" />
              </button>`).join('')}
          </div>`
        : '';

      document.getElementById('product-content').innerHTML = `
        <div class="lg:grid lg:grid-cols-2 lg:gap-12">

          <!-- Left: Gallery -->
          <div>
            <div class="aspect-[4/3] rounded-2xl overflow-hidden bg-gray-100 shadow-md">
              <img id="main-photo" src="${product.image}" alt="${product.name}"
                class="w-full h-full object-cover" onerror="handleImageError(this)" />
            </div>
            ${thumbnailsHtml}
          </div>

          <!-- Right: Info -->
          <div class="mt-8 lg:mt-0 flex flex-col gap-5">

            <!-- Badge + Year -->
            <div class="flex items-center gap-3">
              <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold ${categoryColor}">${categoryLabel}</span>
              <span class="text-sm text-gray-400 font-medium">${product.year}</span>
            </div>

            <!-- Name -->
            <h1 class="text-3xl sm:text-4xl font-black text-gray-900 leading-tight">${product.name}</h1>

            <!-- Tagline -->
            <p class="text-base italic text-gray-500">${product.tagline}</p>

            <!-- Description -->
            <p class="text-sm text-gray-600 leading-relaxed">${product.description}</p>

            <!-- CTA Card -->
            <div class="bg-[#003876] rounded-2xl p-5 text-white">
              <div class="text-xs text-blue-200 uppercase tracking-wide mb-1">Harga Mulai dari</div>
              <div class="text-2xl font-black mb-4">${formatPrice(product.priceStart)}</div>
              <a href="${waLink}" target="_blank" rel="noopener"
                class="flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#1ebe5d] text-white font-bold px-5 py-3 rounded-xl transition-colors w-full">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Hubungi Sales via WhatsApp
              </a>
            </div>

            <!-- Variants Table -->
            ${variantRows ? `
            <div>
              <h3 class="text-base font-black text-gray-800 mb-3">Varian & Harga</h3>
              <div class="rounded-xl overflow-hidden border border-gray-200">
                <table class="w-full text-left">
                  <thead class="bg-[#003876] text-white text-xs uppercase tracking-wide">
                    <tr>
                      <th class="px-4 py-3">Varian</th>
                      <th class="px-4 py-3 text-right">Harga OTR Medan</th>
                    </tr>
                  </thead>
                  <tbody>${variantRows}</tbody>
                </table>
              </div>
              ${notesHtml}
            </div>` : ''}

            <!-- Specs Grid -->
            ${specCards ? `
            <div>
              <h3 class="text-base font-black text-gray-800 mb-3">Spesifikasi Utama</h3>
              <div class="grid grid-cols-2 gap-3">${specCards}</div>
            </div>` : ''}

          </div>
        </div>`;

      // Related products (up to 4, exclude current)
      const related = products.filter(p => p.id !== product.id).slice(0, 4);
      if (related.length > 0) {
        const relSection = document.getElementById('related-section');
        relSection.classList.remove('hidden');
        document.getElementById('related-grid').innerHTML = related.map(r => {
          const rColor = getCategoryColor(r.subcategory);
          const rLabel = getCategoryLabel(r.category, r.subcategory);
          return `
            <a href="product.html?id=${r.id}" class="bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow overflow-hidden border border-gray-100 group">
              <div class="aspect-[4/3] overflow-hidden bg-gray-100">
                <img src="${r.image}" alt="${r.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="handleImageError(this)" />
              </div>
              <div class="p-4">
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-xs font-bold px-2 py-0.5 rounded-full ${rColor}">${rLabel}</span>
                  <span class="text-xs text-gray-400">${r.year}</span>
                </div>
                <h3 class="font-black text-gray-800 text-sm">${r.name}</h3>
                <p class="text-xs text-[#003876] font-semibold mt-1">Mulai ${formatPriceShort(r.priceStart)}</p>
              </div>
            </a>`;
        }).join('');
      }

      // Floating WA button
      initWAButton(wa, waMessage);
    })();

    function changeMainPhoto(src, btn) {
      document.getElementById('main-photo').src = src;
      document.querySelectorAll('.thumb-btn').forEach(b => b.classList.replace('border-[#003876]', 'border-gray-200'));
      btn.classList.replace('border-gray-200', 'border-[#003876]');
    }
  </script>
</body>
</html>
