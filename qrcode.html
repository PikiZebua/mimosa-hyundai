<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scan QR Code - Mimosa Hyundai Medan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#003876] to-[#1565C0] min-h-screen flex items-center justify-center p-6">

  <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">

    <!-- Header -->
    <div class="mb-6">
      <div class="w-16 h-16 bg-[#003876] rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="text-white font-black text-2xl">H</span>
      </div>
      <h1 class="text-2xl font-black text-[#003876]">Mimosa Hyundai Medan</h1>
      <p class="text-gray-500 mt-1">Sales Consultant: Piki Finelis Zebua</p>
    </div>

    <!-- QR Code Website -->
    <div class="bg-gray-50 rounded-2xl p-6 mb-6">
      <p class="text-sm font-semibold text-gray-600 mb-3">Scan untuk buka Website</p>
      <div class="flex justify-center mb-4">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://pikizebua.github.io/mimosa-hyundai/&bgcolor=FFFFFF&color=003876"
          alt="QR Code Website"
          class="rounded-xl shadow-md"
        />
      </div>
      <p class="text-xs text-gray-400 break-all">pikizebua.github.io/mimosa-hyundai</p>
    </div>

    <!-- QR Code WhatsApp -->

      <p class="text-sm font-semibold text-green-700 mb-3">Scan untuk Chat WhatsApp</p>
      <div class="flex justify-center mb-4">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://wa.me/6283829696539?text=Halo%20Piki,%20saya%20tertarik%20dengan%20Hyundai&bgcolor=FFFFFF&color=25D366"
          alt="QR Code WhatsApp"
          class="rounded-xl shadow-md"
        />
      </div>
      <p class="text-xs text-green-600 font-medium">wa.me/6283829696539</p>
    </div>

    <!-- Action Buttons -->
    <div class="space-y-3 no-print">
      <a href="https://pikizebua.github.io/mimosa-hyundai/" target="_blank" class="block w-full bg-[#003876] hover:bg-[#1565C0] text-white font-bold py-3 px-6 rounded-xl transition-colors">
        Buka Website →
      </a>
      <a href="https://wa.me/6283829696539?text=Halo%20Piki,%20saya%20tertarik%20dengan%20Hyundai" target="_blank" class="block w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2">
