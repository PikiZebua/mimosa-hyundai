<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semua Produk — Mimosa Hyundai Medan</title>
  <meta name="description" content="Katalog lengkap Hyundai 2026 dengan harga OTR Medan. SUV, Electric, Hybrid, MPV tersedia."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 font-sans">

  <div id="navbar"></div>

  <main>
    <!-- Page Header -->
    <section class="bg-gradient-to-r from-[#003876] to-[#1565C0]">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <nav class="flex items-center gap-2 text-sm text-blue-200 mb-3">
          <a href="index.html" class="hover:text-white transition-colors">Home</a>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <span class="text-white">Produk</span>
        </nav>
        <h1 class="text-3xl md:text-4xl font-black text-white mb-2">Katalog Produk</h1>
        <p class="text-blue-200 text-sm">Jelajahi lineup lengkap Hyundai 2026 dengan harga OTR Medan</p>
      </div>
    </section>

    <!-- Filters & Sort -->
    <section class="bg-white/95 backdrop-blur-md border-b border-gray-200 sticky top-0 z-40 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-wrap items-center gap-3">
        <!-- Filter Pills -->
        <div class="flex flex-wrap gap-2 flex-1">
          <button data-filter="Semua" class="filter-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:border-[#003876] hover:text-[#003876] transition-all duration-200">Semua</button>
          <button data-filter="SUV" class="filter-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:border-[#003876] hover:text-[#003876] transition-all duration-200">SUV</button>
          <button data-filter="Electric" class="filter-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:border-[#003876] hover:text-[#003876] transition-all duration-200">Electric</button>
          <button data-filter="Hybrid" class="filter-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:border-[#003876] hover:text-[#003876] transition-all duration-200">Hybrid</button>
          <button data-filter="MPV" class="filter-pill px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:border-[#003876] hover:text-[#003876] transition-all duration-200">MPV</button>
        </div>

        <!-- Sort Dropdown -->
        <div class="flex items-center gap-2">
          <label for="sort-select" class="text-sm text-gray-500 whitespace-nowrap hidden sm:inline">Urutkan:</label>
          <select id="sort-select" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#003876] focus:border-transparent bg-white cursor-pointer">
            <option value="default">Default</option>
            <option value="price-asc">Harga Terendah</option>
            <option value="price-desc">Harga Tertinggi</option>
            <option value="name-az">Nama A-Z</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Product Grid -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center py-24">
          <div class="inline-flex items-center justify-center w-16 h-16 bg-gray-100 rounded-full mb-4">
            <svg class="w-8 h-8 text-gray-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </div>
          <p class="text-gray-400 font-medium">Memuat produk...</p>
        </div>
      </div>
      <div id="no-results" class="hidden text-center py-24">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-100 rounded-full mb-4">
          <svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h3 class="text-gray-500 text-lg font-semibold mb-2">Tidak ada produk ditemukan</h3>
        <p class="text-gray-400 text-sm">Coba pilih kategori lain atau reset filter</p>
        <button onclick="setActiveFilter('Semua')" class="mt-4 text-[#003876] font-semibold hover:underline">Reset Filter</button>
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <div id="wa-btn"></div>

  <script>
    let allProducts = [];
    let currentFilter = 'Semua';
    let currentSort = 'default';

    function getProductFilter(p) {
      if (p.category === 'Electric' || p.subcategory === 'Electric') return 'Electric';
      if (p.subcategory === 'Hybrid') return 'Hybrid';
      if (p.category === 'MPV') return 'MPV';
      return 'SUV';
    }

    function renderCard(p) {
      const filterTag = getProductFilter(p);
      const badgeClass = getCategoryColor(p.subcategory || p.category);
      const badgeLabel = getCategoryLabel(p.category, p.subcategory);
      const shortDesc = p.description || '';
      const price = formatPriceShort(p.priceStart);

      return `
        <a href="product.html?id=${p.id}" class="group bg-white rounded-2xl border border-gray-100 overflow-hidden hover:border-[#003876] hover:shadow-xl transition-all duration-300 flex flex-col">
          <div class="aspect-[16/10] overflow-hidden bg-gradient-to-br from-gray-100 to-gray-200 relative">
            <img
              src="${p.image}"
              alt="${p.name}"
              class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
              onerror="handleImageError(this)"
            />
            <div class="absolute top-3 left-3">
              <span class="text-xs font-bold px-2.5 py-1 rounded-full backdrop-blur-sm ${badgeClass}">${badgeLabel}</span>
            </div>
          </div>
          <div class="p-5 flex flex-col flex-1">
            <h3 class="text-[#003876] font-black text-lg leading-tight mb-2 group-hover:text-[#1565C0] transition-colors">${p.name}</h3>
            <p class="text-gray-500 text-sm line-clamp-2 flex-1 mb-4">${shortDesc}</p>
            <div class="flex items-end justify-between mt-auto pt-3 border-t border-gray-100">
              <div>
                <div class="text-xs text-gray-400 mb-0.5">Mulai dari</div>
                <div class="text-[#003876] font-black text-lg">${price}</div>
              </div>
              <span class="inline-flex items-center gap-1 text-[#003876] font-semibold text-sm group-hover:gap-2 transition-all duration-200">
                Detail
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </span>
            </div>
          </div>
        </a>`;
    }

    function applyFilterAndSort() {
      let filtered = allProducts.filter(p => {
        if (currentFilter === 'Semua') return true;
        return getProductFilter(p) === currentFilter;
      });

      if (currentSort === 'price-asc') {
        filtered.sort((a, b) => a.priceStart - b.priceStart);
      } else if (currentSort === 'price-desc') {
        filtered.sort((a, b) => b.priceStart - a.priceStart);
      } else if (currentSort === 'name-az') {
        filtered.sort((a, b) => a.name.localeCompare(b.name, 'id'));
      }

      const grid = document.getElementById('product-grid');
      const noResults = document.getElementById('no-results');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        grid.style.opacity = '1';
        grid.style.transform = 'translateY(0)';
        noResults.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        grid.innerHTML = filtered.map(renderCard).join('');
        grid.style.opacity = '1';
        grid.style.transform = 'translateY(0)';
      }
    }

    function setActiveFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-pill').forEach(btn => {
        const isActive = btn.dataset.filter === filter;
        btn.className = `filter-pill px-4 py-1.5 rounded-full text-sm font-semibold border transition-all duration-200 ${
          isActive
            ? 'bg-[#003876] text-white border-[#003876] shadow-sm'
            : 'bg-white text-gray-600 border-gray-200 hover:border-[#003876] hover:text-[#003876]'
        }`;
      });

      // Animate grid transition
      const grid = document.getElementById('product-grid');
      grid.style.opacity = '0.5';
      grid.style.transform = 'translateY(10px)';
      grid.style.transition = 'opacity 0.2s, transform 0.2s';

      setTimeout(() => {
        applyFilterAndSort();
        grid.style.opacity = '1';
        grid.style.transform = 'translateY(0)';
      }, 150);

      const url = new URL(window.location.href);
      if (filter === 'Semua') {
        url.searchParams.delete('cat');
      } else {
        url.searchParams.set('cat', filter);
      }
      history.replaceState(null, '', url.toString());
    }

    async function init() {
      // Render navbar and footer
      const [products, dealer] = await Promise.all([
        loadJSON('products.json'),
        loadJSON('dealer.json')
      ]);

      document.getElementById('navbar').innerHTML = renderNavbar('catalog.html');
      document.getElementById('footer').innerHTML = renderFooter(dealer);
      initMobileMenu();
      initWAButton(dealer.whatsapp, 'Halo Mimosa Hyundai, saya ingin tanya info produk.');

      allProducts = products;

      // Check URL param
      const params = new URLSearchParams(window.location.search);
      const catParam = params.get('cat');
      const validFilters = ['Semua', 'SUV', 'Electric', 'Hybrid', 'MPV'];
      const initialFilter = validFilters.includes(catParam) ? catParam : 'Semua';

      // Wire filter pills
      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => setActiveFilter(btn.dataset.filter));
      });

      // Wire sort
      document.getElementById('sort-select').addEventListener('change', e => {
        currentSort = e.target.value;
        applyFilterAndSort();
      });

      setActiveFilter(initialFilter);
    }

    init().catch(err => {
      console.error(err);
      document.getElementById('product-grid').innerHTML = '<div class="col-span-full text-center text-red-400 py-16">Gagal memuat produk.</div>';
    });
  </script>

</body>
</html>
