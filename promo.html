<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Promo & Penawaran — Mimosa Hyundai Medan</title>
  <meta name="description" content="Promo dan penawaran terbaik dari Mimosa Hyundai Medan. Cashback, cicilan ringan, dan hadiah menarik untuk Anda."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 font-sans">

  <div id="navbar"></div>

  <main>
    <!-- Page Header -->
    <section class="bg-white border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-3xl font-black text-[#003876]">Promo &amp; Penawaran</h1>
        <p class="text-gray-500 text-sm mt-1">Penawaran terbaik dari Mimosa Hyundai Medan</p>
      </div>
    </section>

    <!-- Promo Grid -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div id="promo-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Cards injected by JS -->
      </div>
      <div id="promo-empty" class="hidden text-center py-20 text-gray-400">
        <p class="text-lg font-semibold">Belum ada promo saat ini.</p>
        <p class="text-sm mt-1">Pantau terus halaman ini untuk penawaran terbaru.</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <!-- Floating WA Button -->
  <a id="wa-float" href="#" target="_blank" rel="noopener"
     class="fixed bottom-6 right-6 z-50 bg-green-500 hover:bg-green-600 text-white rounded-full shadow-lg flex items-center gap-2 px-4 py-3 text-sm font-bold transition-colors">
    <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.139.564 4.147 1.547 5.887L.057 23.456a.5.5 0 00.606.61l5.703-1.49A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.931a9.916 9.916 0 01-5.033-1.366l-.36-.214-3.733.975.997-3.639-.235-.374A9.921 9.921 0 012.069 12C2.069 6.509 6.509 2.069 12 2.069S21.931 6.509 21.931 12 17.491 21.931 12 21.931z"/>
    </svg>
    Hubungi Kami
  </a>

  <script>
    (async () => {
      const [promos, products, dealer] = await Promise.all([
        loadJSON('promos.json'),
        loadJSON('products.json'),
        loadJSON('dealer.json'),
      ]);

      // Build product map for name lookup
      const productMap = {};
      products.forEach(p => { productMap[p.id] = p; });

      // Render navbar and footer
      document.getElementById('navbar').innerHTML = renderNavbar('promo.html');
      document.getElementById('footer').innerHTML = renderFooter(dealer);
      initMobileMenu();

      // Init floating WA button
      const waFloatEl = document.getElementById('wa-float');
      if (dealer.whatsapp) {
        const waLink = buildWhatsAppLink(dealer.whatsapp, 'Halo Mimosa Hyundai, ada yang bisa dibantu?');
        if (waFloatEl) waFloatEl.href = waLink;
      }
      initWAButton(dealer.whatsapp, 'Halo Mimosa Hyundai, ada yang bisa dibantu?');

      // Badge config
      const badgeConfig = {
        HOT:     { label: 'HOT',     cls: 'bg-red-500 text-white' },
        NEW:     { label: 'NEW',     cls: 'bg-green-500 text-white' },
        LIMITED: { label: 'LIMITED', cls: 'bg-orange-500 text-white' },
      };

      // CTA button style
      const ctaGreen = 'bg-green-500 hover:bg-green-600 text-white';
      const ctaNavy  = 'bg-[#003876] hover:bg-[#1565C0] text-white';

      const grid = document.getElementById('promo-grid');

      if (!promos || promos.length === 0) {
        document.getElementById('promo-empty').classList.remove('hidden');
        return;
      }

      promos.forEach(promo => {
        const badge = promo.badge ? badgeConfig[promo.badge] : null;

        // Related product pills
        const pills = (promo.relatedProducts || []).map(pid => {
          const prod = productMap[pid];
          if (!prod) return '';
          return `<a href="product.html?id=${pid}" class="inline-block bg-[#003876]/10 hover:bg-[#003876]/20 text-[#003876] text-xs font-semibold px-3 py-1 rounded-full transition-colors">${prod.name}</a>`;
        }).join('');

        // WA message
        const waMsg = `Halo Mimosa Hyundai, saya tertarik dengan promo '${promo.title}'. Bisa info lebih lanjut?`;
        const waLink = buildWhatsAppLink(dealer.whatsapp, waMsg);

        // CTA style — green for sales-type, navy for others
        const isGreen = promo.badge === 'HOT' || (promo.cta && promo.cta.toLowerCase().includes('hub'));
        const btnCls = isGreen ? ctaGreen : ctaNavy;

        const card = document.createElement('article');
        card.className = 'bg-white rounded-2xl shadow-md overflow-hidden flex flex-col hover:shadow-xl transition-shadow duration-300';
        card.innerHTML = `
          <!-- Image with gradient overlay -->
          <div class="relative aspect-video bg-gray-200 overflow-hidden">
            <img
              src="${promo.image}"
              alt="${promo.title}"
              class="w-full h-full object-cover"
              onerror="handleImageError(this)"
            />
            <!-- Gradient overlay -->
            <div class="absolute inset-0 bg-gradient-to-t from-[#003876]/80 to-transparent"></div>
            ${badge ? `<span class="absolute top-3 left-3 ${badge.cls} text-xs font-black px-2.5 py-1 rounded-full tracking-wider uppercase shadow">${badge.label}</span>` : ''}
            <!-- Title & period over gradient -->
            <div class="absolute bottom-0 left-0 right-0 p-4">
              <h2 class="text-white font-black text-lg leading-tight drop-shadow">${promo.title}</h2>
              <p class="text-blue-200 text-xs mt-0.5 font-medium">${promo.period}</p>
            </div>
          </div>

          <!-- Card Body -->
          <div class="flex flex-col flex-1 p-5 gap-4">
            <p class="text-gray-600 text-sm leading-relaxed">${promo.description}</p>

            ${pills ? `
            <div>
              <p class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-2">Berlaku untuk:</p>
              <div class="flex flex-wrap gap-2">${pills}</div>
            </div>` : ''}

            <div class="mt-auto">
              <a
                href="${waLink}"
                target="_blank"
                rel="noopener"
                class="${btnCls} flex items-center justify-center gap-2 w-full py-3 rounded-xl text-sm font-bold transition-colors"
              >
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                  <path d="M12 0C5.373 0 0 5.373 0 12c0 2.139.564 4.147 1.547 5.887L.057 23.456a.5.5 0 00.606.61l5.703-1.49A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.931a9.916 9.916 0 01-5.033-1.366l-.36-.214-3.733.975.997-3.639-.235-.374A9.921 9.921 0 012.069 12C2.069 6.509 6.509 2.069 12 2.069S21.931 6.509 21.931 12 17.491 21.931 12 21.931z"/>
                </svg>
                ${promo.cta || 'Hubungi Sales'}
              </a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
